# Pre-commit hooks for the bert-ticket-router project.
# Install once with: pre-commit install
# Run on all files with: pre-commit run --all-files
# Hooks run on `git commit` against staged files.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]  # allow custom YAML tags (we don't use any, but harmless)
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        files: ^(src|api)/
        additional_dependencies:
          - pydantic==2.9.0
          - pydantic-settings==2.5.0
          - types-PyYAML
        args: [--config-file=pyproject.toml]
