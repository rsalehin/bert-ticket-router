# Routing rules for the BERT ticket router.
# One entry per banking77 intent (77 total).
#
# Schema (per entry):
#   intent      : banking77 intent label (string)
#   department  : Cards | Transfers | Account | Security | Top-ups | General
#   priority    : P1 (security/fraud) | P2 (blocked or failed) | P3 (informational)
#   sla_hours   : positive integer
#   tags        : 2-4 short keyword strings
#
# Tested by tests/test_routing_config.py.

# ---------------- Security (P1) -----------------------------------------
- intent: lost_or_stolen_card
  department: Security
  priority: P1
  sla_hours: 1
  tags: [card, security, fraud]

- intent: lost_or_stolen_phone
  department: Security
  priority: P1
  sla_hours: 1
  tags: [account, security, device]

- intent: compromised_card
  department: Security
  priority: P1
  sla_hours: 1
  tags: [card, security, fraud]

